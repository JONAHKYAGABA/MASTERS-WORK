# MIMIC-CXR VQA Fine-tuning Configuration
# ==========================================
# Phase 2: Fine-tuning on A-grade data from pretrained checkpoint
#
# This configuration loads from a pretrained checkpoint and
# fine-tunes ALL tasks (VQA, generation, scene graph, grounding, CheXpert)
# on high-quality A-grade data.
#
# Usage:
#   deepspeed --num_gpus=4 train_mimic_cxr.py \
#     --config configs/finetune_config.yaml \
#     --deepspeed_config configs/deepspeed_config.json \
#     --resume_from_checkpoint ./checkpoints/mimic-cxr-vqa-pretrain-mhc/final_model \
#     --phase finetune \
#     --use_deepspeed
#
#   Or with a prebuilt cache:
#   deepspeed --num_gpus=4 train_mimic_cxr.py \
#     --config configs/finetune_config.yaml \
#     --deepspeed_config configs/deepspeed_config.json \
#     --resume_from_checkpoint ./checkpoints/mimic-cxr-vqa-pretrain-mhc/final_model \
#     --prebuilt_cache_train .cache/dataset_samples/samples_train_A_grade.pkl \
#     --phase finetune \
#     --use_deepspeed

model:
  visual_backbone: "convnext_base"
  text_encoder: "emilyalsentzer/Bio_ClinicalBERT"
  visual_feature_dim: 512
  scene_graph_dim: 134
  visual_embedding_dim: 646
  hidden_size: 768
  intermediate_size: 3072
  num_hidden_layers: 6
  num_attention_heads: 12
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
  sim_layers: 2
  
  num_regions: 310
  num_entities: 237
  region_embedding_dim: 64
  entity_embedding_dim: 64
  
  num_binary_classes: 2
  num_category_classes: 14
  num_region_classes: 26
  num_severity_classes: 4
  
  max_question_length: 128
  vocab_size: 30522

data:
  # GCP Server paths
  mimic_cxr_jpg_path: "/home/brian/dataset"
  mimic_ext_cxr_qba_path: "/home/brian/scenegraphdata/physionet.org/files/mimic-ext-cxr-qba/1.0.0"
  chexpert_labels_path: "/home/brian/dataset/mimic-cxr-2.0.0-chexpert.csv.gz"
  
  # FINE-TUNING: Use A grade (highest quality)
  quality_grade: "A"
  view_filter: "frontal_only"
  question_types: null
  
  # Use exports folder for pre-filtered data
  use_exports: true
  export_grade: "A_frontal"  # Uses exports/A_frontal/ if available
  
  # Cache directory for distributed training (prevents NCCL timeout)
  cache_dir: ".cache/dataset_samples"
  
  image_size: 224
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]

training:
  output_dir: "./checkpoints/mimic-cxr-vqa-finetune"
  
  phase: "finetune"
  
  # Batch settings (same GPU budget as pretrain)
  # Effective batch size: 16 * 4 * 4 = 256
  batch_size_per_gpu: 16
  gradient_accumulation_steps: 4
  
  # Fine-tuning: 10-20 epochs on cleaner data
  num_epochs: 15
  
  # Lower learning rate for fine-tuning (prevents catastrophic forgetting)
  learning_rate: 5.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  
  # Mixed precision + gradient checkpointing (same as pretrain)
  fp16: true
  gradient_checkpointing: true
  
  # =====================================================
  # Loss weights — fine-tuning emphasis
  # =====================================================
  # VQA classification (core task)
  vqa_loss_weight: 1.0
  # Answer generation (higher weight for finetuning to produce better free-form answers)
  generation_loss_weight: 0.8
  # CheXpert auxiliary (lower during finetuning — model already learned features)
  chexpert_loss_weight: 0.1
  # Scene graph generation (light supervision to maintain capability)
  scene_graph_loss_weight: 0.05
  # Visual grounding (higher during finetuning for precise localization)
  grounding_loss_weight: 0.2
  # Per-head VQA weights (balanced for finetuning)
  binary_head_weight: 1.0
  category_head_weight: 0.5
  region_head_weight: 0.5
  severity_head_weight: 0.3
  
  # Save at every epoch end (auto-managed); best model tracked separately
  logging_steps: 100
  save_steps: 5000
  save_total_limit: 5
  eval_steps: 2500
  
  # Best model selection — use classification accuracy for VQA
  metric_for_best_model: "classification_accuracy"
  greater_is_better: true
  early_stopping_patience: 5
  
  # DataLoader — CONSERVATIVE workers to avoid OOM
  # (same lessons from pretraining: 2 workers per rank is safe)
  dataloader_num_workers: 2
  dataloader_pin_memory: true
  dataloader_prefetch_factor: 2
  
  # Hugging Face Hub
  hub_model_id: "KYAGABA/mimic-cxr-vqa-finetune"
  hub_private_repo: true
  push_to_hub_strategy: "best"  # Only push best model
  
  seed: 42

wandb:
  enabled: true
  project: "mimic-cxr-vqa"
  entity: "kyagabajonah"
  name: "finetune-a-grade"
  group: "finetuning"
  tags: ["ssg-vqa", "mimic-cxr", "finetune", "a-grade", "gcp-l4"]
  notes: "Fine-tuning ALL tasks on A-grade data from pretrained mHC checkpoint"
  watch_model: true  # Enable for fine-tuning (smaller dataset = faster)
  watch_log_freq: 1000
  log_model: true

deepspeed:
  enabled: true
  config_path: "configs/deepspeed_config.json"
  stage: 2
